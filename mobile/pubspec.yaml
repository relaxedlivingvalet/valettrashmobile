name: valet
description: "Relaxed Living Valet — valet trash management for residents, workers, and property managers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.9

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Existing
  flutter_dotenv: ^5.1.0
  image_picker: ^1.0.10
  supabase_flutter: ^1.10.25

  # Design System
  shadcn_flutter: ^0.0.52
  flex_color_scheme: ^8.4.0
  google_fonts: ^6.2.1

  # Animation
  flutter_animate: ^4.5.0
  rive: ^0.13.16
  lottie: ^3.1.2
  animations: ^2.0.0

  # UI Utilities
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  gap: ^3.0.1
  phosphor_flutter: any
  cached_network_image: ^3.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  connectivity_plus: ^6.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: false

flutter_native_splash:
  color: "#0A0C0F"
  image: "assets/icon/splash_logo.png"
  color_dark: "#0A0C0F"
  android_12:
    color: "#0A0C0F"
    icon_background_color: "#0A0C0F"
    image: "assets/icon/splash_logo.png"
  ios: true
  android: true
  web: false
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/lottie/
    - assets/rive/
    - assets/icon/
